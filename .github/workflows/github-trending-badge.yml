name: GitHub Trending Badge

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: github-trending-badge
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update GitHub Trending badge JSON
        env:
          TRENDING_REPO_ID: Devlaner/devlane
          TRENDING_REPO_NAME: Devlane
        run: |
          node --input-type=module -e "import fs from 'node:fs/promises'; \
          const REPO_ID = process.env.TRENDING_REPO_ID; \
          const SINCE = ['daily','weekly','monthly']; \
          const OUT = 'github-trending.json'; \
          const STATUS = 'github-trending.status.json'; \
          const now = () => new Date().toISOString(); \
          const clamp = (n,min,max)=>Math.min(Math.max(n,min),max); \
          const readStatus = async ()=>{ try { return JSON.parse(await fs.readFile(STATUS,'utf8')); } catch { return {repo:REPO_ID,lastCheckedAt:null,lastSeenAt:null,lastSeenRank:null,lastSeenSince:null,currentRank:null,currentSince:null}; } }; \
          const fetchHtml = async (since)=>{ const url='https://github.com/trending?since='+encodeURIComponent(since); const res=await fetch(url,{headers:{'user-agent':'devlane-trending-badge/1.0',accept:'text/html'}}); if(!res.ok) throw new Error('fetch '+since+' '+res.status); return await res.text(); }; \
          const parseRepos = (html)=>{ const rx=/href=\\\"\\/([A-Za-z0-9_.-]+\\/[A-Za-z0-9_.-]+)\\\"/g; const seen=new Set(); const repos=[]; let m; while((m=rx.exec(html))){ const id=m[1]; if(seen.has(id)) continue; seen.add(id); repos.push(id); if(repos.length>=200) break; } return repos; }; \
          const makeBadge=(msg,color)=>({schemaVersion:1,label:'GitHub Trending',message:msg,color}); \
          const main = async ()=>{ \
            const status = await readStatus(); \
            let found=null; \
            for (const since of SINCE){ \
              const html=await fetchHtml(since); \
              const repos=parseRepos(html); \
              const idx=repos.findIndex(r=>r.toLowerCase()===REPO_ID.toLowerCase()); \
              if(idx!==-1){ const rank=idx+1; if(!found || rank<found.rank) found={rank,since}; } \
            } \
            const checkedAt=now(); \
            status.repo = REPO_ID; \
            status.lastCheckedAt = checkedAt; \
            status.currentRank = found ? found.rank : null; \
            status.currentSince = found ? found.since : null; \
            if(found){ status.lastSeenAt = checkedAt; status.lastSeenRank = found.rank; status.lastSeenSince = found.since; } \
            let badge; \
            if(found){ \
              const r=clamp(found.rank,1,999); \
              badge=makeBadge('#'+r+' '+found.since,'blue'); \
            } else if(status.lastSeenRank){ \
              const r=clamp(status.lastSeenRank,1,999); \
              badge=makeBadge('last #'+r+' '+status.lastSeenSince,'lightgrey'); \
            } else { \
              badge=makeBadge('not trending','lightgrey'); \
            } \
            await fs.writeFile(OUT, JSON.stringify(badge,null,2)+'\\n','utf8'); \
            await fs.writeFile(STATUS, JSON.stringify(status,null,2)+'\\n','utf8'); \
          }; \
          main().catch(e=>{ console.error(e); process.exit(1); });"

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-trending.json github-trending.status.json
          git commit -m "chore(trending): update GitHub Trending badge JSON/status"
          git push

name: GitHub Trending Badge

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: github-trending-badge
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update GitHub Trending badge JSON
        env:
          TRENDING_REPO_ID: Devlaner/devlane
          TRENDING_REPO_NAME: Devlane
        run: |
          node -e "import fs from 'node:fs/promises'; import path from 'node:path'; \
          const REPO_ID = process.env.TRENDING_REPO_ID; \
          const SINCE = ['daily','weekly','monthly']; \
          const OUT = 'github-trending.json'; \
          const now = () => new Date().toISOString(); \
          const clamp = (n,min,max)=>Math.min(Math.max(n,min),max); \
          const readPrev = async ()=>{ try { return JSON.parse(await fs.readFile(OUT,'utf8')); } catch { return null; } }; \
          const fetchHtml = async (since)=>{ const url='https://github.com/trending?since='+encodeURIComponent(since); const res=await fetch(url,{headers:{'user-agent':'devlane-trending-badge/1.0',accept:'text/html'}}); if(!res.ok) throw new Error('fetch '+since+' '+res.status); return await res.text(); }; \
          const parseRepos = (html)=>{ const rx=/href=\\\"\\/([A-Za-z0-9_.-]+\\/[A-Za-z0-9_.-]+)\\\"/g; const seen=new Set(); const repos=[]; let m; while((m=rx.exec(html))){ const id=m[1]; if(seen.has(id)) continue; seen.add(id); repos.push(id); if(repos.length>=200) break; } return repos; }; \
          const makeBadge=(msg,color,meta)=>({schemaVersion:1,label:'GitHub Trending',message:msg,color, ...meta}); \
          const main = async ()=>{ \
            const prev = await readPrev(); \
            const prevLast = prev && prev._lastSeenRank ? {rank: prev._lastSeenRank, since: prev._lastSeenSince, at: prev._lastSeenAt} : null; \
            let found=null; \
            for (const since of SINCE){ \
              const html=await fetchHtml(since); \
              const repos=parseRepos(html); \
              const idx=repos.findIndex(r=>r.toLowerCase()===REPO_ID.toLowerCase()); \
              if(idx!==-1){ const rank=idx+1; if(!found || rank<found.rank) found={rank,since}; } \
            } \
            const checkedAt=now(); \
            let badge; \
            if(found){ \
              const r=clamp(found.rank,1,999); \
              badge=makeBadge('#'+r+' '+found.since,'blue',{_repo:REPO_ID,_lastCheckedAt:checkedAt,_lastSeenAt:checkedAt,_lastSeenRank:r,_lastSeenSince:found.since}); \
            } else if(prevLast){ \
              const r=clamp(prevLast.rank,1,999); \
              badge=makeBadge('last #'+r+' '+prevLast.since,'lightgrey',{_repo:REPO_ID,_lastCheckedAt:checkedAt,_lastSeenAt:prevLast.at,_lastSeenRank:r,_lastSeenSince:prevLast.since}); \
            } else { \
              badge=makeBadge('not trending','lightgrey',{_repo:REPO_ID,_lastCheckedAt:checkedAt}); \
            } \
            await fs.writeFile(OUT, JSON.stringify(badge,null,2)+'\\n','utf8'); \
          }; \
          main().catch(e=>{ console.error(e); process.exit(1); });"

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add github-trending.json
          git commit -m "chore(readme): update GitHub Trending badge"
          git push
